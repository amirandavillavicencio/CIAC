<!DOCTYPE html>
<html>
<head>
  <title>Registro CIAC</title>
</head>
<body>
  <h2>Registro de Asistencia CIAC</h2>
  <form id="form">
    <input type="text" placeholder="Nombre" id="nombre" required /><br><br>
    <input type="email" placeholder="Correo institucional" id="correo" required /><br><br>
    <input type="text" placeholder="Carrera" id="carrera" required /><br><br>
    <input type="text" placeholder="Sesión" id="sesion" required /><br><br>
    <button type="submit">Registrar</button>
  </form>

  <script>
    const form = document.getElementById('form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alert("Registro simulado exitoso (conectaremos a Supabase después)");
    });
  </script>
</body>
</html>
