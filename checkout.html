<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CIAC Check-In · Marcar salida</title>

  <link rel="icon" href="data:,">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root { --blue:#1f4a8d; --bg:#f4f6f8; --card:#fff; --muted:#6b7280; --line:#e5e7eb; }
    body{ margin:0; font-family:Arial, sans-serif; background:var(--bg); color:#111827; }
    .topbar{ background:var(--blue); color:#fff; padding:16px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .brand{ font-weight:900; letter-spacing:.2px; }
    a{ color:#fff; text-decoration:none; font-weight:900; }
    .wrap{ max-width:440px; margin:22px auto; padding:0 14px; }
    .card{ background:var(--card); border-radius:14px; box-shadow:0 8px 20px rgba(0,0,0,.08); border:1px solid var(--line); padding:18px; }
    h1{ margin:0 0 6px; font-size:18px; }
    .sub{ margin:0 0 14px; color:var(--muted); font-size:13px; line-height:1.35; }
    label{ display:block; font-size:12px; color:var(--muted); margin-top:10px; }
    input{ width:100%; padding:10px; margin-top:4px; border-radius:10px; border:1px solid #d1d5db; box-sizing:border-box; background:#fff; }
    button{ width:100%; margin-top:14px; padding:11px; border-radius:10px; border:0; background:var(--blue); color:#fff; font-weight:900; cursor:pointer; }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .msg{ margin-top:10px; font-size:13px; min-height:18px; }
    .hint{ margin-top:12px; background:#ecfeff; border:1px solid #a5f3fc; padding:12px; border-radius:12px; font-size:12px; color:#0f172a; line-height:1.35; }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">CIAC Check-In · Salida</div>
    <a href="index.html">🏠 Inicio</a>
  </div>

  <div class="wrap">
    <div class="card">
      <h1>Marcar salida</h1>
      <p class="sub">Escanea el QR de salida en sala. Válido por 90 segundos.</p>

      <label>Token de salida (si no viene por QR)</label>
      <input id="token" placeholder="(se completa automáticamente)" />

      <button id="btn">Confirmar salida</button>
      <div class="msg" id="msg"></div>

      <div class="hint">
        Importante: debes marcar salida desde el <b>mismo dispositivo</b> con que marcaste entrada.
      </div>
    </div>
  </div>

<script>
const SUPABASE_URL = "https://eepukfxexzawbvlroihd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcHVrZnhleHphd2J2bHJvaWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjMyMDYsImV4cCI6MjA4ODAzOTIwNn0.CPa6FeVD8CbkhQtkPF2KoJeFRIyNfuMTv8TR2cWpzC0";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const msg = document.getElementById("msg");
const tokenEl = document.getElementById("token");
const btn = document.getElementById("btn");

// Token desde querystring
const params = new URLSearchParams(location.search);
const qpToken = params.get("token");
if (qpToken) tokenEl.value = qpToken;

function getDeviceId(){
  let deviceId = localStorage.getItem("ciac_device_id");
  if (!deviceId) {
    deviceId = (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + "-" + Math.random());
    localStorage.setItem("ciac_device_id", deviceId);
  }
  return deviceId;
}

function setStatus(text, color="#111827"){
  msg.style.color = color;
  msg.textContent = text;
}

btn.addEventListener("click", async () => {
  btn.disabled = true;
  setStatus("Validando…");

  const token = tokenEl.value.trim();
  if (!token) {
    setStatus("Escanea el QR de salida o pega el token.", "crimson");
    btn.disabled = false;
    return;
  }

  // RPC por token_salida
  const { data: rows, error: e1 } = await db
    .rpc("get_sesion_por_token_salida", { p_token: token });

  if (e1) {
    setStatus("Error: " + e1.message, "crimson");
    btn.disabled = false;
    return;
  }

  const sesion = (rows && rows.length) ? rows[0] : null;
  if (!sesion) {
    setStatus("Token de salida inválido. Pide al tutor activar el QR de salida.", "crimson");
    btn.disabled = false;
    return;
  }

  // sesión expirada (3h)
  if (!sesion.expira_en || (new Date() > new Date(sesion.expira_en))) {
    setStatus("Sesión expirada. Pide al tutor iniciar una nueva sesión.", "crimson");
    btn.disabled = false;
    return;
  }

  // token salida puntual (90s)
  if (!sesion.token_salida_expira_en || (new Date() > new Date(sesion.token_salida_expira_en))) {
    setStatus("Token de salida expirado. Pide al tutor reactivar el QR de salida.", "crimson");
    btn.disabled = false;
    return;
  }

  const device_id = getDeviceId();

  // ✅ Salida = UPDATE del registro existente (no INSERT)
  const { data: updated, error: e2 } = await db
    .from("asistencias_v2")
    .update({ salida_at: new Date().toISOString() })
    .eq("sesion_id", sesion.id)
    .eq("device_id", device_id)
    .select("id")
    .limit(1);

  if (e2) {
    setStatus("Error: " + e2.message, "crimson");
    btn.disabled = false;
    return;
  }

  if (!updated || updated.length === 0) {
    setStatus("No se encontró tu entrada en esta sesión desde este dispositivo. Marca entrada primero desde este mismo equipo.", "crimson");
    btn.disabled = false;
    return;
  }

  setStatus("✅ Salida registrada.", "green");
  btn.disabled = false;
});
</script>
</body>
</html>
