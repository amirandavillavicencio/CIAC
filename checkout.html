<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CIAC Check-In · Marcar salida</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#EAF2FB;--card:#FFFFFF;--primary:#F06C6C;--primarySoft:#F4A6A6;--blue:#5E86C7;--success:#4FBF9E;--text:#111827;--muted:#6B7280;--line: rgba(17,24,39,0.10);--shadow: 0 18px 40px rgba(17,24,39,0.10);--radius: 18px;}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(1200px 600px at 10% 0%, rgba(94,134,199,.18), rgba(234,242,251,0) 60%),radial-gradient(900px 500px at 90% 10%, rgba(240,108,108,.18), rgba(234,242,251,0) 55%),var(--bg);color:var(--text)}
    .topbar{position:sticky;top:0;background:rgba(255,255,255,.72);backdrop-filter:blur(10px);border-bottom:1px solid rgba(17,24,39,.06)}
    .topbarInner{max-width:1040px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}.brand{font-family:Fraunces,serif}
    .topbar a{text-decoration:none;color:var(--text);font-weight:800;background:rgba(94,134,199,.10);border:1px solid rgba(94,134,199,.18);padding:10px 12px;border-radius:14px}
    .page{max-width:1040px;margin:0 auto;padding:18px 16px 32px}.hero,.card{max-width:600px;margin:0 auto;background:#fff;border:1px solid rgba(17,24,39,.06);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .card{margin-top:16px}h1{margin:0;font-family:Fraunces,serif;font-size:32px}.sub{margin:8px 0 0;color:var(--muted)}
    label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-top:10px}
    input{width:100%;margin-top:6px;padding:14px;border-radius:14px;border:1px solid rgba(17,24,39,.10);background:rgba(234,242,251,.35)}
    button{width:100%;margin-top:14px;padding:14px;border:0;border-radius:14px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primarySoft));cursor:pointer}
    .msg{margin-top:12px;font-size:13px;min-height:18px;padding:10px 12px;border-radius:14px;background:rgba(234,242,251,.35);border:1px dashed rgba(17,24,39,.10)}
    .hint{margin-top:12px;background:rgba(94,134,199,.10);border:1px solid rgba(94,134,199,.18);padding:12px;border-radius:14px;font-size:12px}
  </style>
</head>
<body>
  <div class="topbar"><div class="topbarInner"><div class="brand">CIAC · Registro de salida</div><a href="index.html">Inicio</a></div></div>
  <main class="page"><section class="hero"><h1>Confirmar salida</h1><p class="sub">Escanea el QR de salida en sala. Válido por 90 segundos.</p></section><section class="card"><label>Token de salida (si no viene por QR)</label><input id="token" placeholder="(se completa automáticamente)" /><button id="btn">Confirmar salida</button><div class="msg" id="msg"></div><div class="hint">Importante: debes marcar salida desde el <b>mismo dispositivo</b> con que marcaste entrada.</div></section></main>

<script>
const SUPABASE_URL = "https://eepukfxexzawbvlroihd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcHVrZnhleHphd2J2bHJvaWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjMyMDYsImV4cCI6MjA4ODAzOTIwNn0.CPa6FeVD8CbkhQtkPF2KoJeFRIyNfuMTv8TR2cWpzC0";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const msg = document.getElementById("msg");
const tokenEl = document.getElementById("token");
const btn = document.getElementById("btn");

// Token desde querystring
const params = new URLSearchParams(location.search);
const qpToken = params.get("token");
if (qpToken) tokenEl.value = qpToken;

function getDeviceId(){
  let deviceId = localStorage.getItem("ciac_device_id");
  if (!deviceId) {
    deviceId = (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + "-" + Math.random());
    localStorage.setItem("ciac_device_id", deviceId);
  }
  return deviceId;
}

function setStatus(text, color="#111827"){
  msg.style.color = color;
  msg.textContent = text;
}

btn.addEventListener("click", async () => {
  btn.disabled = true;
  setStatus("Validando…");

  const token = tokenEl.value.trim();
  if (!token) {
    setStatus("Escanea el QR de salida o pega el token.", "crimson");
    btn.disabled = false;
    return;
  }

  // RPC por token_salida
  const { data: rows, error: e1 } = await db
    .rpc("get_sesion_por_token_salida", { p_token: token });

  if (e1) {
    setStatus("Error: " + e1.message, "crimson");
    btn.disabled = false;
    return;
  }

  const sesion = (rows && rows.length) ? rows[0] : null;
  if (!sesion) {
    setStatus("Token de salida inválido. Pide al tutor activar el QR de salida.", "crimson");
    btn.disabled = false;
    return;
  }

  // sesión expirada (3h)
  if (!sesion.expira_en || (new Date() > new Date(sesion.expira_en))) {
    setStatus("Sesión expirada. Pide al tutor iniciar una nueva sesión.", "crimson");
    btn.disabled = false;
    return;
  }

  // token salida puntual (90s)
  if (!sesion.token_salida_expira_en || (new Date() > new Date(sesion.token_salida_expira_en))) {
    setStatus("Token de salida expirado. Pide al tutor reactivar el QR de salida.", "crimson");
    btn.disabled = false;
    return;
  }

  const device_id = getDeviceId();

  // ✅ Salida = UPDATE del registro existente (no INSERT)
  const { data: updated, error: e2 } = await db
    .from("asistencias_v2")
    .update({ salida_at: new Date().toISOString() })
    .eq("sesion_id", sesion.id)
    .eq("device_id", device_id)
    .select("id")
    .limit(1);

  if (e2) {
    setStatus("Error: " + e2.message, "crimson");
    btn.disabled = false;
    return;
  }

  if (!updated || updated.length === 0) {
    setStatus("No se encontró tu entrada en esta sesión desde este dispositivo. Marca entrada primero desde este mismo equipo.", "crimson");
    btn.disabled = false;
    return;
  }

  setStatus("✅ Salida registrada.", "green");
  btn.disabled = false;
});
</script>
</body>
</html>
