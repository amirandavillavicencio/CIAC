async function cargar() {
rows.innerHTML = "";

const { data } = await db
.from("asistencias_v2")

<td>${r.sesiones.codigo6}</td>
<td>${r.sesiones.tutor_correo}</td>
<td>${r.correo_alumno}</td>
</tr>`;
}
}

cargar();
</script>
