<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CIAC Check-In · Tutor</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root { --blue:#1f4a8d; --bg:#f4f6f8; --card:#fff; --muted:#6b7280; --line:#e5e7eb; --cta:#f3c623; --danger:#b91c1c; }
body{ margin:0; font-family:Arial, sans-serif; background:var(--bg); color:#111827; }
.topbar{ background:var(--blue); color:#fff; padding:16px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.brand{ font-weight:900; letter-spacing:.2px; }
a{ color:#fff; text-decoration:none; font-weight:900; }

.wrap{ max-width:560px; margin:22px auto; padding:0 14px; }
.card{ background:var(--card); border-radius:14px; box-shadow:0 8px 20px rgba(0,0,0,.08); border:1px solid var(--line); padding:18px; }

h1{ margin:0 0 6px; font-size:18px; }
.sub{ margin:0 0 14px; color:var(--muted); font-size:13px; line-height:1.35; }
label{ display:block; font-size:12px; color:var(--muted); margin-top:10px; }
input,select{ width:100%; padding:10px; margin-top:4px; border-radius:10px; border:1px solid #d1d5db; box-sizing:border-box; background:#fff; }

.btnRow{ display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.btn{ flex:1 1 160px; padding:11px; border-radius:10px; border:0; font-weight:900; cursor:pointer; }
.btnPrimary{ background:var(--cta); color:#111827; }
.btnDanger{ background:var(--danger); color:#fff; }
.btn:disabled{ opacity:.55; cursor:not-allowed; }

.msg{ margin-top:10px; font-size:13px; min-height:18px; }

.box{
  margin-top:14px;
  display:none;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  background:#fff;
}

.row{ display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
.kv{ font-size:12px; color:var(--muted); }
.code{ font-size:22px; font-weight:900; letter-spacing:.5px; margin:6px 0 0; word-break:break-all; }
.timer{ margin-top:10px; font-size:12px; color:#0f172a; background:#ecfeff; border:1px solid #a5f3fc; padding:10px; border-radius:12px; }

.smalllink{ margin-top:8px; font-size:12px; color:var(--muted); word-break:break-all; }
.smalllink a{ color:#1f4a8d; font-weight:700; text-decoration:underline; }

img{ border:1px solid var(--line); border-radius:12px; padding:10px; background:#fff; }

.summary{
  margin-top:12px;
  display:none;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  background:#fff;
}

.summary .title{ font-weight:900; font-size:13px; margin:0 0 8px; }
.summary .line{ font-size:12px; margin:4px 0; }

</style>
</head>

<body>

<div class="topbar">
<div class="brand">CIAC Check-In · Tutor</div>
</div>

<div class="wrap">
<div class="card">

<h1>Control de sesión</h1>

<label>Campus</label>
<select id="campus">
<option>Casa Central</option>
<option>San Joaquín</option>
<option selected>Vitacura</option>
</select>

<label>Sala</label>
<input id="sala" value="ciac"/>

<label>Área</label>
<select id="area">
<option value="">Selecciona…</option>
<option>Matemática</option>
<option>Física</option>
<option>Química</option>
<option>Programación</option>
</select>

<label>Hora inicio</label>
<select id="horaInicio"></select>

<label>Nombre tutor</label>
<input id="tutorNombre"/>

<label>Correo tutor</label>
<input id="tutor" type="email" value="andres.mirandav@usm.cl"/>

<div class="btnRow">
<button id="btnGen" class="btn btnPrimary">Generar QR de entrada</button>
<button id="btnEnd" class="btn btnDanger" disabled>Finalizar mentoría</button>
</div>

<div class="msg" id="msg"></div>

<div class="box" id="inbox">

<div class="row">

<img id="qrIn" width="190"/>

<div>
<div class="kv">Token entrada</div>
<div class="code" id="inToken">------</div>

<div class="smalllink">
Link:
<a id="inLink" target="_blank"></a>
</div>

</div>
</div>

<div class="timer" id="inTimer">Token activo mientras la sesión esté abierta.</div>

</div>

<div class="summary" id="summary">

<div class="title">Mentoría finalizada</div>

<div class="line">Área: <span id="sumArea"></span></div>
<div class="line">Tutor: <span id="sumTutor"></span></div>
<div class="line">Inicio: <span id="sumInicio"></span></div>
<div class="line">Término: <span id="sumTermino"></span></div>
<div class="line">Duración: <span id="sumDuracion"></span></div>

</div>

</div>
</div>

<script>

const SUPABASE_URL="https://eepukfxexzawbvlroihd.supabase.co";
const SUPABASE_ANON_KEY="TU_ANON_KEY";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const msg=document.getElementById("msg");
const btnGen=document.getElementById("btnGen");
const btnEnd=document.getElementById("btnEnd");

let sessionId=null;

function setMsg(t,c="#111"){msg.style.color=c;msg.textContent=t}

function rand10(){return crypto.randomUUID().replace(/-/g,"").slice(0,10)}

function qrUrl(u){return"https://api.qrserver.com/v1/create-qr-code/?size=190x190&data="+encodeURIComponent(u)}

function renderIn(url){

const link=document.getElementById("inLink")

link.href=url
link.textContent=url

document.getElementById("qrIn").src=qrUrl(url)

}

btnGen.onclick=async()=>{

const campus=document.getElementById("campus").value
const sala=document.getElementById("sala").value
const area=document.getElementById("area").value
const bloque=document.getElementById("horaInicio").value
const tutor=document.getElementById("tutor").value

const{data,error}=await db.from("sesiones").insert([{
campus,
sala,
tipo:area,
bloque,
tutor_correo:tutor
}]).select("id").single()

if(error){setMsg(error.message,"crimson");return}

sessionId=data.id

const token=rand10()

await db.from("sesiones").update({token_actual:token}).eq("id",sessionId)

const url=location.origin+"/checkin.html?token="+token

renderIn(url)

document.getElementById("inToken").textContent=token

document.getElementById("inbox").style.display="block"

btnEnd.disabled=false

setMsg("Sesión creada","green")

}

btnEnd.onclick=async()=>{

if(!sessionId){
setMsg("No hay una mentoría activa para finalizar.","crimson")
return
}

btnEnd.disabled=true

console.log("[CIAC] Finalizando mentoría",{sesion_id:sessionId})

try{

const now=new Date().toISOString()

const{data,error}=await db
.from("sesiones")
.update({
termino_en:now,
token_actual:null
})
.eq("id",sessionId)
.select()
.single()

if(error){

console.error("[CIAC] Update ERROR",error)

setMsg("No se pudo finalizar la mentoría. Reintenta.","crimson")

btnEnd.disabled=false

return

}

console.log("[CIAC] Update OK",data)

setMsg("Mentoría finalizada. QR deshabilitado.","green")

document.getElementById("inbox").style.display="none"

document.getElementById("summary").style.display="block"

document.getElementById("sumArea").textContent=document.getElementById("area").value
document.getElementById("sumTutor").textContent=document.getElementById("tutorNombre").value
document.getElementById("sumInicio").textContent=data.created_at
document.getElementById("sumTermino").textContent=now

}catch(e){

console.error("[CIAC] Update ERROR",e)

setMsg("No se pudo finalizar la mentoría. Reintenta.","crimson")

btnEnd.disabled=false

}

}

function buildTimes(){

const sel=document.getElementById("horaInicio")

for(let h=8;h<=22;h++){

for(let m=0;m<60;m+=15){

if(h===22&&m>0)break

const t=(h+"").padStart(2,"0")+":"+(m+"").padStart(2,"0")

const o=document.createElement("option")

o.value=t
o.textContent=t

sel.appendChild(o)

}

}

sel.value="10:00"

}

buildTimes()

</script>

</body>
</html>
