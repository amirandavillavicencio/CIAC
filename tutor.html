<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CIAC - Portal Tutor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      text-align: center;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }
    .active {
      color: green;
      font-weight: bold;
    }
    .timer {
      font-size: 1.5em;
      margin: 15px 0;
    }
  </style>
</head>
<body>

<h2>Portal Tutor CIAC</h2>

<div id="formSection">
  <input type="text" id="tutorName" placeholder="Nombre Tutor" required>
  <input type="text" id="subject" placeholder="Asignatura" required>
  <select id="modalidad">
    <option value="presencial">Presencial</option>
    <option value="online">Online</option>
  </select>
  <button onclick="startSession()">Iniciar Sesión</button>
</div>

<div id="activeSection" style="display:none;">
  <p class="active">🟢 Sesión Activa</p>
  <p>ID: <span id="sessionId"></span></p>
  <div class="timer" id="timer">00:00:00</div>
  <button onclick="endSession()">Finalizar Sesión</button>
</div>

<script>
let currentSession = null;
let timerInterval = null;

function generateSessionId() {
  const now = new Date();
  return "CIAC-" + now.getFullYear() +
    String(now.getMonth()+1).padStart(2,"0") +
    String(now.getDate()).padStart(2,"0") +
    "-" + Math.floor(Math.random()*1000);
}

function startSession() {
  if (localStorage.getItem("activeSession")) {
    alert("Ya tienes una sesión activa. Finalízala antes de crear una nueva.");
    return;
  }

  const tutor = document.getElementById("tutorName").value;
  const subject = document.getElementById("subject").value;
  const modalidad = document.getElementById("modalidad").value;

  if (!tutor || !subject) {
    alert("Completa todos los campos.");
    return;
  }

  const session = {
    id: generateSessionId(),
    tutor,
    subject,
    modalidad,
    start_at: new Date().toISOString(),
    end_at: null,
    status: "active"
  };

  localStorage.setItem("activeSession", JSON.stringify(session));
  currentSession = session;

  showActiveSession();
}

function showActiveSession() {
  document.getElementById("formSection").style.display = "none";
  document.getElementById("activeSection").style.display = "block";
  document.getElementById("sessionId").innerText = currentSession.id;

  const startTime = new Date(currentSession.start_at);

  timerInterval = setInterval(() => {
    const now = new Date();
    const diff = now - startTime;

    const hours = String(Math.floor(diff / 3600000)).padStart(2,"0");
    const minutes = String(Math.floor((diff % 3600000)/60000)).padStart(2,"0");
    const seconds = String(Math.floor((diff % 60000)/1000)).padStart(2,"0");

    document.getElementById("timer").innerText = `${hours}:${minutes}:${seconds}`;
  }, 1000);
}

function endSession() {
  if (!confirm("¿Confirma que desea finalizar esta tutoría?")) return;

  currentSession.end_at = new Date().toISOString();
  currentSession.status = "closed";

  console.log("Sesión cerrada:", currentSession);

  localStorage.removeItem("activeSession");
  clearInterval(timerInterval);

  alert("Sesión finalizada correctamente.");
  location.reload();
}

// Si ya había sesión activa al recargar
window.onload = () => {
  const saved = localStorage.getItem("activeSession");
  if (saved) {
    currentSession = JSON.parse(saved);
    showActiveSession();
  }
}
</script>

</body>
</html>
