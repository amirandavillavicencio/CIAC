<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CIAC Check-In · Tutor</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root { --blue:#1f4a8d; --bg:#f4f6f8; --card:#fff; --muted:#6b7280; --line:#e5e7eb; --cta:#f3c623; --danger:#b91c1c; }
body{ margin:0; font-family:Arial, sans-serif; background:var(--bg); color:#111827; }
.topbar{ background:var(--blue); color:#fff; padding:16px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.brand{ font-weight:900; letter-spacing:.2px; }
a{ color:#fff; text-decoration:none; font-weight:900; }

.wrap{ max-width:560px; margin:22px auto; padding:0 14px; }
.card{ background:var(--card); border-radius:14px; box-shadow:0 8px 20px rgba(0,0,0,.08); border:1px solid var(--line); padding:18px; }

h1{ margin:0 0 6px; font-size:18px; }
.sub{ margin:0 0 14px; color:var(--muted); font-size:13px; line-height:1.35; }
label{ display:block; font-size:12px; color:var(--muted); margin-top:10px; }
input,select{ width:100%; padding:10px; margin-top:4px; border-radius:10px; border:1px solid #d1d5db; box-sizing:border-box; background:#fff; }

.btnRow{ display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.btn{ flex:1 1 160px; padding:11px; border-radius:10px; border:0; font-weight:900; cursor:pointer; }
.btnPrimary{ background:var(--cta); color:#111827; }
.btnDanger{ background:var(--danger); color:#fff; }
.btn:disabled{ opacity:.55; cursor:not-allowed; }

.msg{ margin-top:10px; font-size:13px; min-height:18px; }

.box{
  margin-top:14px;
  display:none;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  background:#fff;
}

.summary{
  margin-top:12px;
  display:none;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  background:#fff;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">CIAC Check-In · Tutor</div>
</div>

<div class="wrap">
<div class="card">

<h1>Control de sesión</h1>

<label>Campus</label>
<select id="campus">
<option>Casa Central</option>
<option>San Joaquín</option>
<option selected>Vitacura</option>
</select>

<label>Sala</label>
<input id="sala" value="ciac"/>

<label>Área</label>
<select id="area">
<option value="">Selecciona…</option>
<option>Matemática</option>
<option>Física</option>
<option>Química</option>
<option>Programación</option>
</select>

<label>Hora inicio</label>
<select id="horaInicio"></select>

<label>Nombre tutor</label>
<input id="tutorNombre"/>

<label>Correo tutor</label>
<input id="tutor" type="email" value="andres.mirandav@usm.cl"/>

<div class="btnRow">
<button id="btnGen" class="btn btnPrimary">Generar QR de entrada</button>
<button id="btnEnd" class="btn btnDanger" disabled>Finalizar mentoría</button>
</div>

<div class="msg" id="msg"></div>

<div class="box" id="inbox">
<img id="qrIn" width="190"/>
<div id="inToken"></div>
</div>

<div class="summary" id="summary">
<b>Mentoría finalizada</b>
<div id="sumArea"></div>
<div id="sumTutor"></div>
<div id="sumInicio"></div>
<div id="sumTermino"></div>
<div id="sumDuracion"></div>
</div>

</div>
</div>

<script>

const SUPABASE_URL="https://eepukfxexzawbvlroihd.supabase.co";
const SUPABASE_ANON_KEY="TU_ANON_KEY";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const EMAIL_FUNCTION_URL=`${SUPABASE_URL}/functions/v1/super-handler`;

const msg=document.getElementById("msg");
const btnGen=document.getElementById("btnGen");
const btnEnd=document.getElementById("btnEnd");

let sessionId=null;

function setMsg(t,c="#111"){msg.style.color=c;msg.textContent=t}

function rand10(){return crypto.randomUUID().replace(/-/g,"").slice(0,10)}

function qrUrl(u){return"https://api.qrserver.com/v1/create-qr-code/?size=190x190&data="+encodeURIComponent(u)}

async function sendSummaryEmail(sesionId){
  try{

    const res=await fetch(EMAIL_FUNCTION_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+SUPABASE_ANON_KEY,
        "apikey":SUPABASE_ANON_KEY
      },
      body:JSON.stringify({sesion_id:sesionId})
    })

    const text=await res.text()

    let j=null
    try{j=JSON.parse(text)}catch{}

    if(!res.ok){

      const details=
        j?.details
        ? (typeof j.details==="string"?j.details:JSON.stringify(j.details))
        : (j?.error||j?.message||text||("HTTP "+res.status))

      throw new Error(details)
    }

    return true

  }catch(e){

    setMsg("⚠️ Mentoría finalizada, pero no se pudo enviar el correo: "+(e.message||e),"crimson")
    return false
  }
}

btnGen.onclick=async()=>{

const campus=document.getElementById("campus").value
const sala=document.getElementById("sala").value
const area=document.getElementById("area").value
const bloque=document.getElementById("horaInicio").value
const tutor=document.getElementById("tutor").value

const{data,error}=await db.from("sesiones").insert([{
campus,
sala,
tipo:area,
bloque,
tutor_correo:tutor
}]).select("id").single()

if(error){setMsg(error.message,"crimson");return}

sessionId=data.id

const token=rand10()

await db.from("sesiones").update({token_actual:token}).eq("id",sessionId)

const url=location.origin+"/checkin.html?token="+token

document.getElementById("qrIn").src=qrUrl(url)

btnEnd.disabled=false

setMsg("Sesión creada","green")

}

btnEnd.onclick=async()=>{

await db.from("sesiones").update({
termino_en:new Date().toISOString(),
token_actual:null
}).eq("id",sessionId)

await sendSummaryEmail(sessionId)

setMsg("Mentoría finalizada","green")

}

function buildTimes(){
const sel=document.getElementById("horaInicio")
for(let h=8;h<=22;h++){
for(let m=0;m<60;m+=15){
if(h===22&&m>0)break
const t=(h+"").padStart(2,"0")+":"+(m+"").padStart(2,"0")
const o=document.createElement("option")
o.value=t
o.textContent=t
sel.appendChild(o)
}
}
sel.value="10:00"
}

buildTimes()

</script>

</body>
</html>
