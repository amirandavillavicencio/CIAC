<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CIAC Check-In · Marcar asistencia</title>

  <link rel="icon" href="data:,">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root { --blue:#1f4a8d; --bg:#f4f6f8; --card:#fff; --muted:#6b7280; }
    body{ margin:0; font-family:Arial, sans-serif; background:var(--bg); }
    .topbar{ background:var(--blue); color:#fff; padding:16px; font-weight:700; }
    .wrap{ max-width:420px; margin:20px auto; padding:0 14px; }
    .card{ background:#fff; padding:20px; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,.08); }
    label{ display:block; font-size:12px; color:var(--muted); margin-top:10px; }
    input{ width:100%; padding:10px; margin-top:4px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
    button{ width:100%; margin-top:14px; padding:11px; border-radius:8px; border:0; background:var(--blue); color:#fff; font-weight:700; cursor:pointer; }
    .msg{ margin-top:10px; font-size:13px; min-height:18px; }
  </style>
</head>

<body>
  <div class="topbar">CIAC Check-In · Marcar asistencia</div>

  <div class="wrap">
    <div class="card">
      <label>Correo institucional</label>
      <input id="correo" type="email" placeholder="nombre@usm.cl" />

      <label>Código 6 dígitos</label>
      <input id="code" inputmode="numeric" maxlength="6" placeholder="123456" />

      <button id="btn">Registrar</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://eepukfxexzawbvlroihd.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcHVrZnhleHphd2J2bHJvaWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjMyMDYsImV4cCI6MjA4ODAzOTIwNn0.CPa6FeVD8CbkhQtkPF2KoJeFRIyNfuMTv8TR2cWpzC0";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const msg = document.getElementById("msg");
    const correoEl = document.getElementById("correo");
    const codeEl = document.getElementById("code");
    const btn = document.getElementById("btn");

    // Autocompletar si viene desde QR (?code=xxxxxx)
    const params = new URLSearchParams(location.search);
    const qp = params.get("code");
    if (qp) codeEl.value = qp;

    btn.addEventListener("click", async () => {
      msg.style.color = "#111827";
      msg.textContent = "Validando...";

      const correo = correoEl.value.trim().toLowerCase();
      const code = codeEl.value.trim();

      if (!correo.endsWith("@usm.cl")) {
        msg.style.color = "crimson";
        msg.textContent = "Ingresa un correo @usm.cl";
        return;
      }
      if (!/^\d{6}$/.test(code)) {
        msg.style.color = "crimson";
        msg.textContent = "El código debe tener 6 dígitos.";
        return;
      }

      // Buscar sesión por código (la más reciente)
      const { data: sesion, error: e1 } = await db
        .from("sesiones")
        .select("id, expira_en")
        .eq("codigo6", code)
        .order("created_at", { ascending: false })
        .limit(1)
        .maybeSingle();

      if (e1) {
        msg.style.color = "crimson";
        msg.textContent = "Error: " + e1.message;
        return;
      }
      if (!sesion) {
        msg.style.color = "crimson";
        msg.textContent = "Código inválido.";
        return;
      }
      if (new Date() > new Date(sesion.expira_en)) {
        msg.style.color = "crimson";
        msg.textContent = "Código expirado.";
        return;
      }

      // Insert asistencia
      const { error: e2 } = await db
        .from("asistencias_v2")
        .insert([{ sesion_id: sesion.id, correo_alumno: correo }]);

      if (e2) {
        // duplicado (ya marcó)
        if ((e2.message || "").toLowerCase().includes("duplicate") || (e2.code || "") === "23505") {
          msg.style.color = "crimson";
          msg.textContent = "Ya registraste asistencia en esta sesión.";
          return;
        }
        msg.style.color = "crimson";
        msg.textContent = "Error: " + e2.message;
        return;
      }

      msg.style.color = "green";
      msg.textContent = "✅ Asistencia registrada.";
      correoEl.value = "";
    });
  </script>
</body>
</html>
