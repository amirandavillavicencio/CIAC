<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CIAC Check-In · Marcar asistencia</title>

  <link rel="icon" href="data:,">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root { --blue:#1f4a8d; --bg:#f4f6f8; --card:#fff; --muted:#6b7280; --line:#e5e7eb; }
    body{ margin:0; font-family:Arial, sans-serif; background:var(--bg); color:#111827; }
    .topbar{ background:var(--blue); color:#fff; padding:16px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .brand{ font-weight:900; letter-spacing:.2px; }
    a{ color:#fff; text-decoration:none; font-weight:900; }
    .wrap{ max-width:440px; margin:22px auto; padding:0 14px; }
    .card{ background:var(--card); border-radius:14px; box-shadow:0 8px 20px rgba(0,0,0,.08); border:1px solid var(--line); padding:18px; }
    h1{ margin:0 0 6px; font-size:18px; }
    .sub{ margin:0 0 14px; color:var(--muted); font-size:13px; line-height:1.35; }
    label{ display:block; font-size:12px; color:var(--muted); margin-top:10px; }
    input{ width:100%; padding:10px; margin-top:4px; border-radius:10px; border:1px solid #d1d5db; box-sizing:border-box; background:#fff; }
    button{ width:100%; margin-top:14px; padding:11px; border-radius:10px; border:0; background:var(--blue); color:#fff; font-weight:900; cursor:pointer; }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .msg{ margin-top:10px; font-size:13px; min-height:18px; }
    .hint{ margin-top:12px; background:#ecfeff; border:1px solid #a5f3fc; padding:12px; border-radius:12px; font-size:12px; color:#0f172a; line-height:1.35; }
    .hide{ display:none; }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">CIAC Check-In · Asistencia</div>
    <a href="index.html">🏠 Inicio</a>
  </div>

  <div class="wrap">
    <div class="card">
      <h1>Marcar asistencia</h1>
      <p class="sub">Escanea el QR en sala. Luego completa tus datos.</p>

      <label>Nombre y apellido</label>
      <input id="nombre" placeholder="Ej: Nombre Apellido" autocomplete="name" />

      <label>Correo institucional</label>
      <input id="correo" type="email" placeholder="nombre@usm.cl" autocomplete="email" />

      <!-- Token: se autocompleta por QR; lo dejamos por si alguien lo pega manual -->
      <div id="tokenWrap">
        <label>Token</label>
        <input id="token" placeholder="(se completa automáticamente)" />
      </div>

      <button id="btn">Registrar</button>
      <div class="msg" id="msg"></div>

      <div class="hint">
        Puedes registrar desde un celular compartido. Se permite <b>1 registro por correo</b> en cada sesión.
      </div>
    </div>
  </div>

<script>
const SUPABASE_URL = "https://eepukfxexzawbvlroihd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcHVrZnhleHphd2J2bHJvaWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjMyMDYsImV4cCI6MjA4ODAzOTIwNn0.CPa6FeVD8CbkhQtkPF2KoJeFRIyNfuMTv8TR2cWpzC0";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const msg = document.getElementById("msg");
const nombreEl = document.getElementById("nombre");
const correoEl = document.getElementById("correo");
const tokenEl = document.getElementById("token");
const tokenWrap = document.getElementById("tokenWrap");
const btn = document.getElementById("btn");

// Token desde querystring (QR)
const params = new URLSearchParams(location.search);
const qpToken = params.get("token");
if (qpToken) {
  tokenEl.value = qpToken;
  // Si viene por QR, opcionalmente ocultamos el campo para que no “pida token”
  tokenWrap.classList.add("hide");
}

function setStatus(text, color="#111827"){
  msg.style.color = color;
  msg.textContent = text;
}

btn.addEventListener("click", async () => {
  btn.disabled = true;
  setStatus("Validando…");

  const nombre_completo = (nombreEl.value || "").trim();
  const correo = (correoEl.value || "").trim().toLowerCase();
  const token = (tokenEl.value || "").trim();

  if (!nombre_completo) {
    setStatus("Completa tu nombre y apellido.", "crimson");
    btn.disabled = false;
    return;
  }

  if (!correo.endsWith("@usm.cl")) {
    setStatus("Ingresa tu correo institucional @usm.cl", "crimson");
    btn.disabled = false;
    return;
  }

  if (!token) {
    setStatus("Escanea el QR en sala (o pega el token).", "crimson");
    btn.disabled = false;
    return;
  }

  // 1) Buscar sesión por token (RPC)
  const { data: rows, error: e1 } = await db
    .rpc("get_sesion_por_token", { p_token: token });

  if (e1) {
    setStatus("Error: " + e1.message, "crimson");
    btn.disabled = false;
    return;
  }

  const sesion = (rows && rows.length) ? rows[0] : null;

  if (!sesion) {
    setStatus("Token inválido. Pide al tutor el QR vigente.", "crimson");
    btn.disabled = false;
    return;
  }

  // ✅ Regla única: bloquear si la sesión está cerrada
  if (sesion.termino_en) {
    setStatus("Sesión cerrada. Ya no se puede registrar asistencia.", "crimson");
    btn.disabled = false;
    return;
  }

  // 🚫 Importante: NO validamos token_expira_en (porque tu token es fijo)
  // if (sesion.token_expira_en && new Date() > new Date(sesion.token_expira_en)) { ... }

  // 2) Insert: UNIQUE (sesion_id, correo_alumno)
  const { error: e2 } = await db
    .from("asistencias_v2")
    .insert([{
      sesion_id: sesion.id,
      correo_alumno: correo,
      nombre_completo
    }]);

  if (e2) {
    const m = (e2.message || "").toLowerCase();
    const code = (e2.code || "");
    if (code === "23505" || m.includes("duplicate") || m.includes("unique")) {
      setStatus("ℹ️ Este correo ya está registrado en esta sesión.", "crimson");
      btn.disabled = false;
      return;
    }
    setStatus("Error: " + e2.message, "crimson");
    btn.disabled = false;
    return;
  }

  setStatus("✅ Asistencia registrada.", "green");

  // Celular compartido: limpiar campos para el siguiente alumno
  nombreEl.value = "";
  correoEl.value = "";
  btn.disabled = false;
});
</script>
</body>
</html>
