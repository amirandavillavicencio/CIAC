<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CIAC Check-In · Marcar asistencia</title>

  <link rel="icon" href="data:,">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root { --blue:#1f4a8d; --bg:#f4f6f8; --card:#fff; --muted:#6b7280; --line:#e5e7eb; }
    body{ margin:0; font-family:Arial, sans-serif; background:var(--bg); color:#111827; }
    .topbar{ background:var(--blue); color:#fff; padding:16px 22px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .brand{ font-weight:900; letter-spacing:.2px; }
    a{ color:#fff; text-decoration:none; font-weight:900; }
    .wrap{ max-width:440px; margin:22px auto; padding:0 14px; }
    .card{ background:var(--card); border-radius:14px; box-shadow:0 8px 20px rgba(0,0,0,.08); border:1px solid var(--line); padding:18px; }
    h1{ margin:0 0 6px; font-size:18px; }
    .sub{ margin:0 0 14px; color:var(--muted); font-size:13px; line-height:1.35; }
    label{ display:block; font-size:12px; color:var(--muted); margin-top:10px; }
    input{ width:100%; padding:10px; margin-top:4px; border-radius:10px; border:1px solid #d1d5db; box-sizing:border-box; background:#fff; }
    button{ width:100%; margin-top:14px; padding:11px; border-radius:10px; border:0; background:var(--blue); color:#fff; font-weight:900; cursor:pointer; }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .msg{ margin-top:10px; font-size:13px; min-height:18px; }
    .hint{ margin-top:12px; background:#ecfeff; border:1px solid #a5f3fc; padding:12px; border-radius:12px; font-size:12px; color:#0f172a; line-height:1.35; }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">CIAC Check-In · Asistencia</div>
    <a href="index.html">🏠 Inicio</a>
  </div>

  <div class="wrap">
    <div class="card">
      <h1>Marcar asistencia</h1>
      <p class="sub">Escanea el QR en sala. Luego ingresa tu RUT.</p>

      <label>RUT</label>
      <input id="rut" placeholder="Ej: 12.345.678-5" autocomplete="off" />

      <label>Token (si no viene por QR)</label>
      <input id="token" placeholder="(se completa automáticamente)" />

      <button id="btn">Registrar</button>
      <div class="msg" id="msg"></div>

      <div class="hint">
        Puedes registrar desde un celular compartido. Se permite <b>1 registro por RUT</b> en cada sesión.
      </div>
    </div>
  </div>

<script>
const SUPABASE_URL = "https://eepukfxexzawbvlroihd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcHVrZnhleHphd2J2bHJvaWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjMyMDYsImV4cCI6MjA4ODAzOTIwNn0.CPa6FeVD8CbkhQtkPF2KoJeFRIyNfuMTv8TR2cWpzC0";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const msg = document.getElementById("msg");
const rutEl = document.getElementById("rut");
const tokenEl = document.getElementById("token");
const btn = document.getElementById("btn");

const params = new URLSearchParams(location.search);
const qpToken = params.get("token");
if (qpToken) tokenEl.value = qpToken;

function setStatus(text, color="#111827"){
  msg.style.color = color;
  msg.textContent = text;
}

function cleanRut(input){
  return (input || "")
    .toString()
    .trim()
    .toUpperCase()
    .replace(/\s+/g, "")
    .replace(/\./g, "");
}

function formatRut(rut){
  const r = cleanRut(rut).replace(/-/g, "");
  if (r.length < 2) return rut;
  const body = r.slice(0, -1);
  const dv = r.slice(-1);
  return `${body}-${dv}`;
}

function rutDV(body){
  let sum = 0;
  let mul = 2;
  for (let i = body.length - 1; i >= 0; i--) {
    sum += parseInt(body[i], 10) * mul;
    mul = (mul === 7) ? 2 : mul + 1;
  }
  const mod = 11 - (sum % 11);
  if (mod === 11) return "0";
  if (mod === 10) return "K";
  return String(mod);
}

function isValidRut(rut){
  const r = cleanRut(rut);
  if (!r) return false;
  const noDash = r.replace(/-/g, "");
  if (noDash.length < 2) return false;

  const body = noDash.slice(0, -1);
  const dv = noDash.slice(-1);

  if (!/^\d+$/.test(body)) return false;
  if (!/^[0-9K]$/.test(dv)) return false;
  if (body.length < 7 || body.length > 9) return false;

  return rutDV(body) === dv;
}

rutEl.addEventListener("blur", () => {
  const r = rutEl.value.trim();
  if (!r) return;
  rutEl.value = formatRut(r);
});

btn.addEventListener("click", async () => {
  btn.disabled = true;
  setStatus("Validando…");

  const rutInput = (rutEl.value || "").trim();
  const rut = formatRut(rutInput);
  const token = (tokenEl.value || "").trim();

  if (!isValidRut(rutInput)) {
    setStatus("RUT inválido. Revisa el formato y dígito verificador.", "crimson");
    btn.disabled = false;
    return;
  }

  if (!token) {
    setStatus("Escanea el QR en sala o pega el token.", "crimson");
    btn.disabled = false;
    return;
  }

  const { data: rows, error: e1 } = await db.rpc("get_sesion_por_token", { p_token: token });

  if (e1) {
    setStatus("Error: " + e1.message, "crimson");
    btn.disabled = false;
    return;
  }

  const sesion = (rows && rows.length) ? rows[0] : null;
  if (!sesion) {
    setStatus("Token inválido. Escanea el QR actualizado.", "crimson");
    btn.disabled = false;
    return;
  }

  if (!sesion.expira_en || (new Date() > new Date(sesion.expira_en))) {
    setStatus("Sesión expirada. Pide al tutor iniciar una nueva sesión.", "crimson");
    btn.disabled = false;
    return;
  }

  if (!sesion.token_expira_en || (new Date() > new Date(sesion.token_expira_en))) {
    setStatus("Token expirado. Escanea el QR actualizado.", "crimson");
    btn.disabled = false;
    return;
  }

  const { error: e2 } = await db
    .from("asistencias_v2")
    .insert([{ sesion_id: sesion.id, rut }]);

  if (e2) {
    const m = (e2.message || "").toLowerCase();
    const code = (e2.code || "");
    if (code === "23505" || m.includes("duplicate") || m.includes("unique")) {
      setStatus("ℹ️ Este RUT ya está registrado en esta sesión.", "crimson");
      btn.disabled = false;
      return;
    }
    setStatus("Error: " + e2.message, "crimson");
    btn.disabled = false;
    return;
  }

  setStatus("✅ Asistencia registrada.", "green");
  rutEl.value = "";
  btn.disabled = false;
});
</script>
</body>
</html>
