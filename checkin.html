<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CIAC Check-In · Marcar asistencia</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    :root{--bg:#EAF2FB;--card:#FFFFFF;--primary:#F06C6C;--primarySoft:#F4A6A6;--blue:#5E86C7;--success:#4FBF9E;--text:#111827;--muted:#6B7280;--line: rgba(17,24,39,0.10);--shadow: 0 18px 40px rgba(17,24,39,0.10);--radius: 18px;}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(1200px 600px at 10% 0%, rgba(94,134,199,.18), rgba(234,242,251,0) 60%),radial-gradient(900px 500px at 90% 10%, rgba(240,108,108,.18), rgba(234,242,251,0) 55%),var(--bg);color:var(--text)}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.72);backdrop-filter:blur(10px);border-bottom:1px solid rgba(17,24,39,.06)}
    .topbarInner{max-width:1040px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}
    .brand{display:flex;align-items:center;gap:10px}.brand img{width:34px;height:34px;border-radius:12px;background:#fff;padding:4px;border:1px solid rgba(17,24,39,.08)}
    .brand .t{font-family:Fraunces,serif}.brand .s{font-size:12px;color:var(--muted);font-weight:600}
    .topbar a{text-decoration:none;color:var(--text);font-weight:800;background:rgba(94,134,199,.10);border:1px solid rgba(94,134,199,.18);padding:10px 12px;border-radius:14px}
    .page{max-width:1040px;margin:0 auto;padding:18px 16px 32px}
    .hero,.card{background:var(--card);border:1px solid rgba(17,24,39,.06);border-radius:var(--radius);box-shadow:var(--shadow)}
    .hero{padding:18px;max-width:600px;margin:0 auto}
    .hero h1{margin:0;font-family:Fraunces,serif;font-size:32px;line-height:1.08}
    .hero p{margin:8px 0 0;color:var(--muted);font-size:14px}
    .card{max-width:600px;margin:16px auto 0;padding:20px}
    label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-top:10px}
    input{width:100%;margin-top:6px;padding:16px;border-radius:14px;border:1px solid rgba(17,24,39,.10);background:rgba(234,242,251,.35);font-size:16px}
    input:focus{outline:none;border-color:rgba(94,134,199,.55);box-shadow:0 0 0 4px rgba(94,134,199,.14);background:#fff}
    button{width:100%;margin-top:14px;padding:16px;border:0;border-radius:14px;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primarySoft));box-shadow:0 14px 30px rgba(240,108,108,.22);font-size:16px}
    .msg,.msgAlert{margin-top:12px;font-size:13px;min-height:18px;padding:12px;border-radius:14px;background:rgba(234,242,251,.35);border:1px dashed rgba(17,24,39,.10)}
    .msg.ok{color:#0f5132;background:rgba(79,191,158,.12);border:1px solid rgba(79,191,158,.35)}
    .msg.err{color:#b42318;background:rgba(240,108,108,.12);border:1px solid rgba(240,108,108,.35)}
    .msg.info{color:#1f3b70;background:rgba(94,134,199,.12);border:1px solid rgba(94,134,199,.35)}
    .hint{margin-top:12px;padding:12px;border-radius:14px;background:rgba(94,134,199,.10);border:1px solid rgba(94,134,199,.18);font-size:12px;color:var(--text)}
    .hide{display:none}.heroImg{width:100%;max-height:180px;object-fit:cover;border-radius:14px;border:1px solid rgba(17,24,39,.06);margin:10px 0 12px;background:#fff}
    @media (max-width:700px){.page{padding:14px 12px 24px}.hero,.card{border-radius:16px}.hero h1{font-size:28px}}
  </style>
</head>
<body>
  <div class="topbar"><div class="topbarInner"><div class="brand"><img src="logonuevociac.png" alt="Logo"><div><div class="t">CIAC</div><div class="s">Check-in estudiantes</div></div></div><a href="index.html">Inicio</a></div></div>
  <main class="page">
    <section class="hero"><h1>Registro de asistencia</h1><p>Escanea el QR en sala y completa tus datos para confirmar tu participación.</p></section>
    <section class="card">
      <img class="heroImg" src="hero-alumno.png" alt="CIAC · Check-in de asistencia" loading="lazy" />
      <label>Nombre y apellido</label>
      <input id="nombre" placeholder="Ej: Nombre Apellido" autocomplete="name" />
      <label>Correo institucional</label>
      <input id="correo" type="email" placeholder="nombre@usm.cl" autocomplete="email" inputmode="email" />
      <div id="tokenWrap"><label>Token</label><input id="token" placeholder="(se completa automáticamente)" /></div>
      <button id="btn">Registrar</button>
      <div class="msg" id="msg"></div>
      <div class="hint">Puedes registrar desde un celular compartido. Se permite <b>1 registro por correo</b> en cada sesión.</div>
    </section>
  </main>

<script>
const SUPABASE_URL = "https://eepukfxexzawbvlroihd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcHVrZnhleHphd2J2bHJvaWhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjMyMDYsImV4cCI6MjA4ODAzOTIwNn0.CPa6FeVD8CbkhQtkPF2KoJeFRIyNfuMTv8TR2cWpzC0";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const msg = document.getElementById("msg");
const nombreEl = document.getElementById("nombre");
const correoEl = document.getElementById("correo");
const tokenEl = document.getElementById("token");
const tokenWrap = document.getElementById("tokenWrap");
const btn = document.getElementById("btn");
const BTN_IDLE_TEXT = "Registrar";
const BTN_BUSY_TEXT = "Registrando…";
const LS_LAST_BY_EMAIL = "ciac_checkin_last_name_by_email";

function getStoredNames(){
  try { return JSON.parse(localStorage.getItem(LS_LAST_BY_EMAIL) || "{}"); } catch { return {}; }
}
function saveStoredName(correo, nombre){
  if (!correo || !nombre) return;
  const dbNames = getStoredNames();
  dbNames[correo] = nombre;
  localStorage.setItem(LS_LAST_BY_EMAIL, JSON.stringify(dbNames));
}

function setStatus(text, kind="info"){
  msg.classList.remove("ok", "err", "info");
  msg.classList.add(kind);
  msg.textContent = text;
}

function setSubmitting(isBusy){
  btn.disabled = !!isBusy;
  btn.textContent = isBusy ? BTN_BUSY_TEXT : BTN_IDLE_TEXT;
}

// Token desde querystring (QR)
const params = new URLSearchParams(location.search);
const qpToken = params.get("token");
if (qpToken) {
  tokenEl.value = qpToken;
  tokenWrap.classList.add("hide");
}

correoEl.addEventListener("input", ()=>{
  const correo = (correoEl.value || "").trim().toLowerCase();
  if (!correo.endsWith("@usm.cl")) return;
  const stored = getStoredNames()[correo];
  if (stored && !nombreEl.value.trim()) {
    nombreEl.value = stored;
    setStatus("Sugerencia aplicada: se recuperó tu nombre guardado para este correo.", "info");
  }
});

async function doCheckin(){
  console.log("Iniciando check-in");

  // Evitar doble envío
  setSubmitting(true);
  setStatus("Validando…", "info");

  const nombre_completo = (nombreEl.value || "").trim();
  const correo = (correoEl.value || "").trim().toLowerCase();
  const token = (tokenEl.value || "").trim();

  if (!nombre_completo) {
    setStatus("Completa tu nombre y apellido.", "err");
    setSubmitting(false);
    return;
  }

  // Validación correo @usm.cl
  if (!correo.endsWith("@usm.cl")) {
    setStatus("Debes ingresar tu correo institucional @usm.cl", "err");
    setSubmitting(false);
    return;
  }

  // Token obligatorio (si no viene, QR inválido)
  if (!token) {
    setStatus("Token inválido / sesión no encontrada.", "err");
    setSubmitting(false);
    return;
  }

  // 1) Buscar sesión por token (RPC)
  const { data: rows, error: e1 } = await db
    .rpc("get_sesion_por_token", { p_token: token });

  if (e1) {
    console.error("Error asistencia:", e1);
    setStatus("Error de red / reintento.", "err");
    setSubmitting(false);
    return;
  }

  const sesion = (rows && rows.length) ? rows[0] : null;
  console.log("Sesión encontrada:", sesion);

  // QR inválido si no hay sesión
  if (!sesion) {
    setStatus("Token inválido / sesión no encontrada.", "err");
    setSubmitting(false);
    return;
  }

  // Sesión cerrada si termino_en no es null o token_actual es null
  if (sesion.termino_en || sesion.token_actual === null) {
    setStatus("Sesión cerrada (o QR deshabilitado).", "err");
    setSubmitting(false);
    return;
  }

  // 2) Insert: UNIQUE (sesion_id, correo_alumno)
  const { error: e2 } = await db
    .from("asistencias_v2")
    .insert([{
      sesion_id: sesion.id,
      correo_alumno: correo,
      nombre_completo
    }]);

  if (e2) {
    console.error("Error asistencia:", e2);
    const m = (e2.message || "").toLowerCase();
    const code = (e2.code || "");
    if (code === "23505" || m.includes("duplicate") || m.includes("unique")) {
      setStatus("Ya estás registrado en esta tutoría.", "err");
      setSubmitting(false);
      return;
    }
    setStatus("Error de red / reintento.", "err");
    setSubmitting(false);
    return;
  }

  console.log("Insert asistencia OK");
  setStatus("Asistencia registrada correctamente.", "ok");
  saveStoredName(correo, nombre_completo);

  // Limpiar nombre y mantener correo para reducir fricción en sala
  nombreEl.value = "";
  nombreEl.focus();

  setSubmitting(false);
}

btn.addEventListener("click", doCheckin);

// Enter en correo registra (mejora UX sin tocar diseño)
correoEl.addEventListener("keydown", (e)=>{
  if(e.key === "Enter" && !btn.disabled){
    e.preventDefault();
    doCheckin();
  }
});
</script>
</body>
</html>
